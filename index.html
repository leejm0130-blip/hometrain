<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="홈트">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="icon.png">
<title>홈트 루틴</title>
<style>
:root{
--bg:#0a0a0a;--sf:#141414;--sf2:#1e1e1e;--bd:rgba(255,255,255,0.08);
--tx:#f0f0f0;--mu:#666;--ac:#d4f03c;--acd:rgba(212,240,60,0.12);
--rest:#3cd4f0;--dn:#3cf096;--dnd:rgba(60,240,150,0.10);
--c-pull:#d4f03c;--c-push:#f09060;--c-sqt:#3cd4f0;
--sat:env(safe-area-inset-top);--sab:env(safe-area-inset-bottom);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,'SF Pro Display',sans-serif;min-height:100dvh;padding-top:max(56px, calc(env(safe-area-inset-top) + 14px));padding-left:20px;padding-right:20px;padding-bottom:max(40px, calc(env(safe-area-inset-bottom) + 80px));user-select:none;overflow-x:hidden;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;}
.app-t{font-size:13px;font-weight:600;letter-spacing:.12em;color:var(--mu);text-transform:uppercase;}
.log-b{font-size:12px;padding:5px 12px;border-radius:99px;border:1px solid var(--bd);color:var(--mu);background:0;cursor:pointer;font-family:inherit;}
.log-b.has{border-color:rgba(212,240,60,.4);color:var(--ac);}
.mtabs{display:flex;gap:6px;margin-bottom:14px;}
.mtab{flex:1;padding:11px 4px;font-size:14px;font-weight:600;border:1px solid var(--bd);border-radius:14px;background:0;color:var(--mu);cursor:pointer;font-family:inherit;transition:all .2s;text-align:center;}
.mtab.a{background:var(--sf2);color:var(--tx);border-color:rgba(255,255,255,.12);}
.stabs{display:flex;background:var(--sf);border-radius:12px;padding:3px;margin-bottom:18px;gap:2px;}
.stab{flex:1;padding:7px 4px;font-size:12px;font-weight:500;border:0;border-radius:9px;background:0;color:var(--mu);cursor:pointer;font-family:inherit;}
.stab.a{background:var(--sf2);color:var(--tx);}
.mp{display:none;}.mp.a{display:block;}
.sp{display:none;}.sp.a{display:block;}
.info{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.info-t{font-size:12px;color:var(--mu);line-height:1.5;}
.info-t b{color:var(--tx);font-weight:500;}
.gear{width:32px;height:32px;border-radius:50%;border:1px solid var(--bd);background:0;color:var(--mu);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

.slbl{font-size:12px;color:var(--mu);text-align:center;margin-bottom:4px;min-height:18px;}
.slbl strong{color:var(--tx);font-weight:600;}
.arcw{position:relative;width:200px;height:200px;margin:0 auto 8px;}
.arcw svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.abg{fill:none;stroke:var(--sf2);stroke-width:4;}
.afg{fill:none;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .1s linear,stroke .3s;}
.arcc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:4px;}
.tnum{font-size:72px;font-weight:700;letter-spacing:-3px;color:var(--tx);line-height:1;font-variant-numeric:tabular-nums;transition:color .3s;}
.tnum.rm{color:var(--rest);}.tnum.dm{color:var(--dn);}.tnum.pre{color:#ff3b30;}
.tsub{font-size:12px;color:var(--mu);margin-top:6px;height:16px;}
.bm{width:100%;padding:17px;border-radius:16px;border:0;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;transition:transform .1s,opacity .2s;background:var(--ac);color:#0a0a0a;margin-bottom:12px;}
.bm:active{transform:scale(.97);}
.bm.restm{background:var(--rest);}.bm.dis{opacity:.35;pointer-events:none;}
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(50px,1fr));gap:7px;margin-bottom:14px;}
.sc{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:11px;border:1px solid var(--bd);font-size:14px;font-weight:600;color:var(--mu);background:var(--sf);transition:all .2s;}
.sc .su{font-size:9px;font-weight:400;margin-top:1px;}
.sc.cur{border-color:var(--ac);color:var(--ac);background:var(--acd);}
.sc.cur .su{color:var(--ac);opacity:.6;}
.sc.dn{background:var(--sf2);border-color:transparent;color:#333;}.sc.dn .su{color:#333;}
.rsta{margin-top:6px;padding-top:6px;border-top:1px solid var(--bd);}
.brst{width:100%;padding:12px;border-radius:14px;border:1px solid rgba(255,80,80,.25);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;background:0;color:#ff5050;}
.brst:active{transform:scale(.97);}
.ov{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.75);}
.ov.show{display:flex;align-items:flex-end;justify-content:center;padding:0 16px max(20px, calc(env(safe-area-inset-bottom) + 20px));}
.dbox{background:#1c1c1e;border-radius:20px;padding:22px 20px 18px;width:100%;max-width:400px;}
.dtit{font-size:17px;font-weight:600;margin-bottom:6px;}
.dmsg{font-size:14px;color:var(--mu);margin-bottom:18px;line-height:1.5;}
.dbtns{display:flex;gap:10px;}
.dcan{flex:1;padding:14px;border-radius:14px;border:1px solid var(--bd);background:var(--sf2);color:var(--tx);font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;}
.dcon{flex:1;padding:14px;border-radius:14px;border:0;background:#ff3b30;color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.setov{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.75);}
.setov.show{display:flex;align-items:flex-end;justify-content:center;padding:0 16px max(20px, calc(env(safe-area-inset-bottom) + 20px));}
.setbox{background:#1c1c1e;border-radius:20px;padding:22px 20px 18px;width:100%;max-width:400px;max-height:70vh;overflow-y:auto;}
.setrow{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.setlbl{font-size:14px;color:var(--tx);}
.setinp{width:70px;padding:8px 12px;border-radius:10px;border:1px solid var(--bd);background:var(--sf);color:var(--tx);font-size:16px;font-weight:600;text-align:center;font-family:inherit;}
.setsave{width:100%;padding:14px;border-radius:14px;border:0;background:var(--ac);color:#0a0a0a;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:6px;}
.setadd{display:flex;gap:8px;margin-bottom:14px;}
.setadd button{flex:1;padding:10px;border-radius:12px;border:1px solid var(--bd);background:var(--sf);color:var(--tx);font-size:14px;cursor:pointer;font-family:inherit;}
.setdiv{height:1px;background:var(--bd);margin:14px 0;}
.calov{display:none;position:fixed;inset:0;background:var(--bg);z-index:200;overflow-y:auto;padding:max(56px, calc(env(safe-area-inset-top) + 14px)) 20px max(40px, calc(env(safe-area-inset-bottom) + 20px));}
.calov.show{display:block;}
.calh{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.caltt{font-size:20px;font-weight:700;}
.calcl{font-size:14px;color:var(--mu);background:var(--sf);border:0;border-radius:99px;padding:6px 14px;cursor:pointer;font-family:inherit;}
.str{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;}
.stc{background:var(--sf);border-radius:14px;padding:12px 14px;}
.stn{font-size:24px;font-weight:700;color:var(--ac);}
.stl{font-size:11px;color:var(--mu);margin-top:2px;}
.cnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.cml{font-size:16px;font-weight:600;}
.cnb{width:32px;height:32px;border-radius:50%;border:1px solid var(--bd);background:0;color:var(--mu);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;}
.cgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:16px;}
.cdow{text-align:center;font-size:11px;color:var(--mu);padding:4px 0;font-weight:500;}
.cd{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:9px;font-size:13px;font-weight:500;color:var(--mu);position:relative;}
.cd.om{color:#222;}.cd.today{border:1px solid rgba(255,255,255,.2);color:var(--tx);}
.cd .dots{display:flex;gap:2px;position:absolute;bottom:3px;}
.cd .dot{width:4px;height:4px;border-radius:50%;}
.cleg{display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap;}
.clgi{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--mu);}
.clgd{width:10px;height:10px;border-radius:3px;}
.rctit{font-size:12px;font-weight:600;color:var(--mu);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;}
.rci{display:flex;align-items:center;justify-content:space-between;background:var(--sf);border-radius:13px;padding:12px 14px;margin-bottom:6px;}
.rcd{font-size:14px;font-weight:500;}.rcs{font-size:11px;color:var(--mu);margin-top:2px;}
.rctags{display:flex;gap:4px;flex-wrap:wrap;align-items:center;}
.rctag{font-size:10px;padding:2px 7px;border-radius:99px;font-weight:500;cursor:pointer;}
.rctag.del{background:rgba(255,80,80,.15);color:#ff5050;font-size:9px;padding:2px 6px;margin-left:2px;}
.rdel{width:28px;height:28px;border-radius:50%;border:1px solid rgba(255,80,80,.25);background:0;color:#ff5050;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-left:8px;flex-shrink:0;}
.bcl{width:100%;margin-top:16px;padding:12px;border-radius:14px;border:1px solid rgba(255,80,80,.2);background:0;color:#ff5050;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;}
.add-dlg-date{font-size:14px;color:var(--mu);margin-bottom:14px;}
.add-btns{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.add-btn{padding:14px;border-radius:14px;border:1px solid var(--bd);background:var(--sf);color:var(--tx);font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:10px;}
.add-btn:active{transform:scale(.97);}
.add-btn .ab-dot{width:10px;height:10px;border-radius:3px;}
.add-btn.added{opacity:.4;pointer-events:none;}
.cd.clickable{cursor:pointer;}
.cd.clickable:active{background:rgba(255,255,255,.08);}
.bkup-area{margin-top:24px;padding-top:16px;border-top:1px solid var(--bd);}
.bkup-title{font-size:12px;font-weight:600;color:var(--mu);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;}
.bkup-row{display:flex;gap:8px;margin-bottom:10px;}
.bkup-btn{flex:1;padding:13px;border-radius:14px;border:1px solid var(--bd);background:var(--sf);color:var(--tx);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;text-align:center;}
.bkup-btn:active{transform:scale(.97);}
.bkup-note{font-size:11px;color:var(--mu);line-height:1.6;margin-bottom:10px;}
.bkup-ok{background:var(--sf);border:1px solid rgba(60,240,150,.3);border-radius:14px;padding:12px 16px;margin-top:10px;font-size:13px;color:var(--dn);display:none;text-align:center;}
.bk-remind{background:var(--sf);border:1px solid rgba(240,144,96,.3);border-radius:14px;padding:12px 16px;margin-bottom:14px;display:none;align-items:center;justify-content:space-between;gap:10px;}
.bk-remind.show{display:flex;}
.bk-remind-txt{font-size:13px;color:var(--c-push);line-height:1.4;}
.bk-remind-btn{padding:7px 14px;border-radius:10px;border:1px solid rgba(240,144,96,.3);background:0;color:var(--c-push);font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap;}
.bk-remind-close{background:0;border:0;color:var(--mu);font-size:16px;cursor:pointer;padding:0 4px;}
</style>
</head>
<body>
<div class="calov" id="calov"><div class="calh"><div class="caltt">운동 기록</div><button class="calcl" onclick="closeCal()">닫기</button></div><div class="str" id="stats"></div><div class="cnav"><button class="cnb" onclick="calM(-1)">‹</button><div class="cml" id="cml"></div><button class="cnb" onclick="calM(1)">›</button></div><div class="cgrid" id="cgrid"></div><div class="cleg"><div class="clgi"><div class="clgd" style="background:var(--c-pull)"></div>턱걸이</div><div class="clgi"><div class="clgd" style="background:var(--c-push)"></div>푸쉬업</div><div class="clgi"><div class="clgd" style="background:var(--c-sqt)"></div>스쿼트</div><div class="clgi"><div style="width:10px;height:10px;border-radius:50%;box-shadow:inset 0 0 0 2px var(--dn);"></div>데일리</div></div><div class="rctit">최근 기록</div><div id="rlog"></div><div class="bkup-area"><div class="bkup-title">데이터 관리</div><div class="bkup-row"><button class="bkup-btn" onclick="backupLog()">백업 저장</button><button class="bkup-btn" onclick="document.getElementById('restoreFile').click()">백업 복원</button></div><input type="file" id="restoreFile" accept=".json" style="display:none" onchange="restoreLog(this)"><div class="bkup-note">한 달에 한 번 백업 권장<br>데이터 유실 시 복원 파일로 복구 가능</div><div class="bkup-ok" id="bkupOk"></div></div><button class="bcl" onclick="clearLog()">기록 전체 삭제</button></div>
<div class="ov" id="rdlg"><div class="dbox"><div class="dtit">초기화할까요?</div><div class="dmsg">현재 진행 상황이 초기화돼.<br>운동 기록은 유지돼.</div><div class="dbtns"><button class="dcan" id="rc">취소</button><button class="dcon" id="rok">초기화</button></div></div></div>
<div class="ov" id="ldlg" style="z-index:450"><div class="dbox"><div class="dtit" id="ldtit">삭제할까요?</div><div class="dmsg" id="ldmsg"></div><div class="dbtns"><button class="dcan" id="ldc">취소</button><button class="dcon" id="ldok">삭제</button></div></div></div>
<div class="ov" id="addlg" style="z-index:450"><div class="dbox"><div class="dtit">운동 기록 추가</div><div class="add-dlg-date" id="addDate"></div><div class="add-btns" id="addBtns"></div><div class="dbtns"><button class="dcan" onclick="closeAdd()" style="flex:1">닫기</button></div></div></div>
<div class="setov" id="setov"><div class="setbox" id="setbox"></div></div>
<div class="hdr"><div class="app-t">홈트 루틴</div><div style="display:flex;align-items:center;gap:8px;"><button id="daily-btn" onclick="openDailyFs()" style="width:48px;height:48px;border-radius:50%;border:2px solid var(--dn);background:var(--dnd);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0;"><span style="font-size:9px;font-weight:600;color:var(--dn);line-height:1;" id="daily-btn-label">매달리기</span><span style="font-size:11px;font-weight:700;color:var(--dn);line-height:1.2;" id="daily-btn-sec">60초</span></button><button class="log-b" id="logb" onclick="openCal()">기록</button></div></div>
<div class="bk-remind" id="bkRemind"><div class="bk-remind-txt" id="bkRemindTxt"></div><button class="bk-remind-btn" onclick="openCal()">백업하기</button><button class="bk-remind-close" onclick="dismissRemind()">✕</button></div>

<!-- 데일리 전체화면 오버레이 -->
<div id="daily-fs" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:350;flex-direction:column;padding:0;" id="daily-fs">
  <!-- 스와이프 힌트 -->
  <div style="display:flex;flex-direction:column;align-items:center;padding-top:calc(env(safe-area-inset-top)+14px);gap:6px;opacity:.3;">
    <div style="font-size:10px;color:var(--mu);letter-spacing:.06em;">↑ 설정</div>
    <div style="width:36px;height:4px;border-radius:2px;background:var(--mu);"></div>
  </div>
  <!-- 중앙 타이머 -->
  <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 32px;">
    <div class="arcw" style="width:260px;height:260px;margin-bottom:24px;">
      <svg width="260" height="260" viewBox="0 0 260 260" style="position:absolute;top:0;left:0;transform:rotate(-90deg)">
        <circle fill="none" stroke="var(--sf2)" stroke-width="6" cx="130" cy="130" r="114"/>
        <circle class="afg" id="af_daily" fill="none" stroke-width="6" stroke-linecap="round" cx="130" cy="130" r="114" stroke="#d4f03c" stroke-dasharray="716" stroke-dashoffset="0"/>
      </svg>
      <div class="arcc">
        <div class="tnum" id="tn_daily" style="font-size:96px;"></div>
        <div class="tsub" id="ts_daily">준비</div>
      </div>
    </div>
    <div style="font-size:13px;color:var(--mu);min-height:20px;margin-bottom:36px;text-align:center;" id="sl_daily"></div>
    <button class="bm" id="bt_daily" onclick="dailyAct()" style="width:100%;max-width:300px;">시작</button>
    <button onclick="askR('daily')" style="margin-top:14px;background:0;border:0;color:var(--mu);font-size:13px;cursor:pointer;padding:10px 20px;opacity:.5;">초기화</button>
  </div>
  <!-- 하단 힌트 -->
  <div style="display:flex;flex-direction:column;align-items:center;padding-bottom:calc(env(safe-area-inset-bottom)+20px);gap:6px;opacity:.3;">
    <div style="width:36px;height:4px;border-radius:2px;background:var(--mu);"></div>
    <div style="font-size:10px;color:var(--mu);letter-spacing:.06em;">↓ 닫기</div>
  </div>
</div>
<div id="flash-overlay" style="display:none;position:fixed;inset:0;background:#fff;z-index:400;pointer-events:none;opacity:0;"></div>
<div class="mtabs"><button class="mtab a" onclick="mTab(0)">턱걸이</button><button class="mtab" onclick="mTab(1)">푸쉬업</button><button class="mtab" onclick="mTab(2)">스쿼트</button></div>

<div class="mp a" id="mp0">
  <div class="stabs"><button class="stab a" onclick="sTab(0,0)">매달리기</button><button class="stab" onclick="sTab(0,1)">풀업</button><button class="stab" onclick="sTab(0,2)">네거티브</button></div>
  <div class="sp a" id="sp00"><div class="info"><div class="info-t" id="hi_hang"></div><button class="gear" onclick="openSet('hang')">⚙</button></div><div class="slbl" id="sl_hang"></div><div class="arcw"><svg width="200" height="200" viewBox="0 0 200 200"><circle class="abg" cx="100" cy="100" r="88"/><circle class="afg" id="af_hang" cx="100" cy="100" r="88" stroke="#d4f03c" stroke-dasharray="553" stroke-dashoffset="0"/></svg><div class="arcc"><div class="tnum" id="tn_hang">30</div><div class="tsub" id="ts_hang">준비</div></div></div><button class="bm" id="bt_hang" onclick="hangAct()">시작</button><div class="sgrid" id="sg_hang"></div><div class="rsta"><button class="brst" onclick="askR('hang')">초기화</button></div></div>
  <div class="sp" id="sp01"><div class="info"><div class="info-t" id="hi_pull"></div><button class="gear" onclick="openSet('pull')">⚙</button></div><div class="slbl" id="sl_pull"></div><div class="arcw"><svg width="200" height="200" viewBox="0 0 200 200"><circle class="abg" cx="100" cy="100" r="88"/><circle class="afg" id="af_pull" cx="100" cy="100" r="88" stroke="#d4f03c" stroke-dasharray="553" stroke-dashoffset="553"/></svg><div class="arcc"><div class="tnum" id="tn_pull">—</div><div class="tsub" id="ts_pull">수행 후 완료</div></div></div><button class="bm" id="bt_pull" onclick="repAct('pull')">완료</button><div class="sgrid" id="sg_pull"></div><div class="rsta"><button class="brst" onclick="askR('pull')">초기화</button></div></div>
  <div class="sp" id="sp02"><div class="info"><div class="info-t" id="hi_neg"></div><button class="gear" onclick="openSet('neg')">⚙</button></div><div class="slbl" id="sl_neg"></div><div class="arcw"><svg width="200" height="200" viewBox="0 0 200 200"><circle class="abg" cx="100" cy="100" r="88"/><circle class="afg" id="af_neg" cx="100" cy="100" r="88" stroke="#d4f03c" stroke-dasharray="553" stroke-dashoffset="553"/></svg><div class="arcc"><div class="tnum" id="tn_neg">—</div><div class="tsub" id="ts_neg">수행 후 완료</div></div></div><button class="bm" id="bt_neg" onclick="repAct('neg')">세트 완료</button><div class="sgrid" id="sg_neg"></div><div class="rsta"><button class="brst" onclick="askR('neg')">초기화</button></div></div>
</div>

<div class="mp" id="mp1">
  <div class="stabs"><button class="stab a" onclick="sTab(1,0)">기본</button><button class="stab" onclick="sTab(1,1)">와이드</button><button class="stab" onclick="sTab(1,2)">다이아몬드</button></div>

<script>
const C=553;let audioCtx=null,cY,cM;
function ga(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}

function bell(){
  try{const c=ga(),t=c.currentTime;
  [1319,2637,3951].forEach((freq,i)=>{
    const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
    o.type='sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime([.5,.25,.12][i],t+.003);
    g.gain.exponentialRampToValueAtTime(.001,t+[.9,.5,.35][i]);
    o.start(t);o.stop(t+[.9,.5,.35][i]);
  });}catch(e){}}

function preBeep(){try{const c=ga(),t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';o.frequency.value=880;g.gain.setValueAtTime(.35,t);g.gain.exponentialRampToValueAtTime(.001,t+.12);o.start(t);o.stop(t+.12);}catch(e){}}

function restSnd(){try{const c=ga();[660,880,1100].forEach((f,i)=>{const t=c.currentTime+i*.13,o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.45,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25);});}catch(e){}}
function doneSnd(){try{const c=ga();[523,659,784,1047].forEach((f,i)=>{const t=c.currentTime+i*.1,o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.4,t);g.gain.exponentialRampToValueAtTime(.001,t+.6);o.start(t);o.stop(t+.6);});}catch(e){}}
function vib(p){if(navigator.vibrate)navigator.vibrate(p);}
function setArc(id,r,col){const e=document.getElementById(id);e.style.stroke=col;e.style.strokeDashoffset=C-Math.max(0,Math.min(1,r))*C;}

const DEF={hang:{dur:30,sets:[1,1]},pull:{reps:[3,3,3,3,3],rest:90},neg:{reps:[3,3,3],rest:90},push:{reps:[40,30,20],rest:60},wide:{reps:[15,15,15],rest:60},dia:{reps:[8,8,8],rest:60},sqt:{reps:[30,30,30],rest:60},lng:{reps:[10,10,10,10,10],rest:60},daily:{dur:60}};
function getS(){try{const s=JSON.parse(localStorage.getItem('ht_cfg')||'{}');const r={};Object.keys(DEF).forEach(k=>{r[k]=s[k]?{...DEF[k],...s[k]}:{...DEF[k]};});return r;}catch(e){return JSON.parse(JSON.stringify(DEF));}}
function saveS(s){try{localStorage.setItem('ht_cfg',JSON.stringify(s));}catch(e){}}
function cfg(k){return getS()[k];}

let setKey=null,tmpReps=[];
const UNIT={hang:'초',pull:'개',neg:'개',push:'개',wide:'개',dia:'개',sqt:'개',lng:'각 다리',daily:'초'};
const NAMES={hang:'매달리기',pull:'풀업',neg:'네거티브',push:'기본 푸쉬업',wide:'와이드 푸쉬업',dia:'다이아몬드 푸쉬업',sqt:'스쿼트',lng:'런지',daily:'데일리 매달리기'};

function openSet(k){
  setKey=k;const c=cfg(k);
  let h='<div class="dtit" style="margin-bottom:16px">'+NAMES[k]+' 설정</div>';
  if(k==='hang'||k==='daily'){
    h+='<div class="setrow"><span class="setlbl">시간(초)</span><input class="setinp" type="number" id="si_dur" value="'+c.dur+'" inputmode="numeric"></div>';
    if(k==='hang')h+='<div class="setrow"><span class="setlbl">세트 수</span><input class="setinp" type="number" id="si_hsets" value="'+c.sets.length+'" inputmode="numeric"></div>';
  }else{
    tmpReps=[...c.reps];
    h+='<div id="setRW">'+rrI()+'</div>';
    h+='<div class="setadd"><button onclick="addS()">+ 세트 추가</button><button onclick="rmS()">- 세트 제거</button></div>';
    h+='<div class="setdiv"></div>';
    h+='<div class="setrow"><span class="setlbl">휴식(초)</span><input class="setinp" type="number" id="si_rest" value="'+c.rest+'" inputmode="numeric"></div>';
  }
  h+='<button class="setsave" onclick="savSet()">저장</button>';
  document.getElementById('setbox').innerHTML=h;
  document.getElementById('setov').classList.add('show');
}
function rrI(){const u=UNIT[setKey];return tmpReps.map((r,i)=>'<div class="setrow"><span class="setlbl">'+(i+1)+'세트 ('+u+')</span><input class="setinp" type="number" id="si_r'+i+'" value="'+r+'" inputmode="numeric" onchange="tmpReps['+i+']=parseInt(this.value)||1"></div>').join('');}
function addS(){tmpReps.push(tmpReps[tmpReps.length-1]||5);document.getElementById('setRW').innerHTML=rrI();}
function rmS(){if(tmpReps.length<=1)return;tmpReps.pop();document.getElementById('setRW').innerHTML=rrI();}
function savSet(){
  const s=getS();
  if(setKey==='hang'){const dur=parseInt(document.getElementById('si_dur').value)||30;const n=parseInt(document.getElementById('si_hsets').value)||2;s.hang={dur,sets:Array(n).fill(1)};}
  else if(setKey==='daily'){const dur=parseInt(document.getElementById('si_dur').value)||60;s.daily={dur};}
  else{tmpReps.forEach((v,i)=>{tmpReps[i]=parseInt(document.getElementById('si_r'+i).value)||tmpReps[i];});const rest=parseInt(document.getElementById('si_rest').value)||60;s[setKey]={reps:[...tmpReps],rest};}
  saveS(s);document.getElementById('setov').classList.remove('show');initAll();
}
document.getElementById('setov').addEventListener('click',function(e){if(e.target===this)this.classList.remove('show');});

// 하위 운동 순서 관리
const SEQ={
  0:{keys:['hang','pull','neg'],cat:'턱걸이',labels:['매달리기','풀업','네거티브'],cleared:[false,false,false]},
  1:{keys:['push','wide','dia'],cat:'푸쉬업',labels:['기본','와이드','다이아몬드'],cleared:[false,false,false]},
  2:{keys:['sqt','lng'],cat:'스쿼트',labels:['스쿼트','런지'],cleared:[false,false]}
};

function onExDone(key){
  for(const[mIdx,seq]of Object.entries(SEQ)){
    const si=seq.keys.indexOf(key);
    if(si===-1)continue;
    seq.cleared[si]=true;
    updateSubTabs(parseInt(mIdx));
    if(seq.cleared.every(c=>c)){
      recLog(seq.cat);
      setTimeout(()=>{resetAllEx();resetSeq();openCal();},1500);
      return;
    }
    const nextIdx=seq.cleared.findIndex(c=>!c);
    if(nextIdx!==-1){
      setTimeout(()=>sTabNav(parseInt(mIdx),nextIdx),1200);
    }
    return;
  }
  // 푸쉬업 등 단독 운동
  recLog(CAT[key]);
  setTimeout(()=>{resetAllEx();openCal();},1500);
}

function updateSubTabs(mIdx){
  const seq=SEQ[mIdx];if(!seq)return;
  const p=document.getElementById('mp'+mIdx);
  const tabs=p.querySelectorAll('.stab');
  tabs.forEach((t,i)=>{
    t.textContent=seq.labels[i]+(seq.cleared[i]?' ✓':'');
  });
}

function resetSeq(){
  Object.values(SEQ).forEach(s=>{s.cleared=s.cleared.map(()=>false);});
  Object.keys(SEQ).forEach(m=>updateSubTabs(parseInt(m)));
}

function resetAllEx(){Object.values(EX).forEach(e=>e.reset());}
function resetDone(){resetAllEx();resetSeq();}

function mTab(i){document.querySelectorAll('.mtab').forEach((t,x)=>t.classList.toggle('a',x===i));document.querySelectorAll('.mp').forEach((p,x)=>p.classList.toggle('a',x===i));}

function sTabNav(m,s){const p=document.getElementById('mp'+m);p.querySelectorAll('.stab').forEach((t,x)=>t.classList.toggle('a',x===s));p.querySelectorAll('.sp').forEach((t,x)=>t.classList.toggle('a',x===s));}

function sTab(m,s){sTabNav(m,s);}


let pendR=null;
function askR(k){pendR=k;document.getElementById('rdlg').classList.add('show');}
document.getElementById('rdlg').addEventListener('click',function(e){if(e.target===this)closeR();});
document.getElementById('rc').addEventListener('click',closeR);
document.getElementById('rok').addEventListener('click',function(){closeR();if(pendR&&EX[pendR])EX[pendR].reset();pendR=null;});
function closeR(){document.getElementById('rdlg').classList.remove('show');}

const EX={};const CAT={hang:'턱걸이',pull:'턱걸이',neg:'턱걸이',push:'푸쉬업',wide:'푸쉬업',dia:'푸쉬업',sqt:'스쿼트',lng:'스쿼트',daily:'데일리'};
function localDate(d){d=d||new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function makeRepEx(key,btnLabel,infoFn){
  const ex={set:0,phase:'idle',restTime:0,interval:null,
    reps(){return cfg(key).reps;},
    rest(){return cfg(key).rest;},
    init(){this.reset();document.getElementById('hi_'+key).innerHTML=infoFn(cfg(key));},
    buildGrid(){
      const reps=this.reps();const g=document.getElementById('sg_'+key);g.innerHTML='';
      reps.forEach((r,i)=>{const d=document.createElement('div');d.className='sc'+(i===0?' cur':'');d.id='sg_'+key+'_'+i;
      d.innerHTML=r+'<div class="su">'+(key==='lng'?'각':'개')+'</div>';
      g.appendChild(d);});
      document.getElementById('sl_'+key).textContent='1 / '+reps.length+'세트';
      document.getElementById('tn_'+key).textContent='—';document.getElementById('tn_'+key).className='tnum';
      document.getElementById('ts_'+key).textContent='수행 후 완료';
      document.getElementById('bt_'+key).textContent=btnLabel;document.getElementById('bt_'+key).className='bm';
      setArc('af_'+key,0,'#d4f03c');
    },
    act(){
      if(this.phase==='rest'||this.phase==='done')return;
      const reps=this.reps();if(this.set>=reps.length)return;
      bell();vib(100);
      const el=document.getElementById('sg_'+key+'_'+this.set);if(el){el.classList.remove('cur');el.classList.add('dn');}
      this.set++;
      document.getElementById('sl_'+key).textContent=this.set+' / '+reps.length+'세트 완료';
      if(this.set>=reps.length){
        document.getElementById('tn_'+key).textContent='✓';document.getElementById('tn_'+key).className='tnum dm';
        document.getElementById('ts_'+key).textContent='완료!';document.getElementById('bt_'+key).textContent='완료!';document.getElementById('bt_'+key).className='bm dis';
        setArc('af_'+key,1,'#3cf096');setTimeout(()=>{doneSnd();vib([100,50,100,50,300]);},400);
        onExDone(key);return;
      }
      const nxt=document.getElementById('sg_'+key+'_'+this.set);if(nxt)nxt.classList.add('cur');
      this.phase='rest';this.restTime=this.rest();
      document.getElementById('bt_'+key).textContent='—';document.getElementById('bt_'+key).className='bm dis';
      document.getElementById('tn_'+key).textContent=this.restTime;
      document.getElementById('tn_'+key).className='tnum rm';
      document.getElementById('ts_'+key).textContent='휴식 중';
      setArc('af_'+key,0,'#3cd4f0');
      document.getElementById('sl_'+key).innerHTML='다음: <strong>'+(this.set+1)+'세트</strong>';
      this.interval=setInterval(()=>this.tick(),1000);
    },
    tick(){
      const rest=this.rest();const reps=this.reps();
      this.restTime--;
      if(this.restTime<=0){
        clearInterval(this.interval);
        document.getElementById('tn_'+key).textContent='0';
        setArc('af_'+key,1,'#ff3b30');
        bell();vib([200,100,200]);this.phase='idle';
        setTimeout(()=>{
          document.getElementById('tn_'+key).textContent='—';document.getElementById('tn_'+key).className='tnum';
          document.getElementById('ts_'+key).textContent='수행 후 완료';
          document.getElementById('sl_'+key).textContent=(this.set+1)+' / '+reps.length+'세트';
          document.getElementById('bt_'+key).textContent=btnLabel;document.getElementById('bt_'+key).className='bm';
          setArc('af_'+key,0,'#d4f03c');
        },300);
        return;
      }
      document.getElementById('tn_'+key).textContent=this.restTime;
      if(this.restTime<=5){
        setArc('af_'+key,1-this.restTime/rest,'#ff3b30');
        document.getElementById('tn_'+key).className='tnum pre';
        document.getElementById('ts_'+key).textContent='준비!';
        preBeep();vib(50);
      }else{
        setArc('af_'+key,1-this.restTime/rest,'#3cd4f0');
        document.getElementById('tn_'+key).className='tnum rm';
        document.getElementById('ts_'+key).textContent='휴식 중';
      }
      document.getElementById('sl_'+key).innerHTML='다음: <strong>'+(this.set+1)+'세트</strong>';
    },
    reset(){clearInterval(this.interval);this.set=0;this.phase='idle';this.restTime=0;this.interval=null;this.buildGrid();}
  };EX[key]=ex;
}

(function(){
  const ex={set:0,phase:'idle',time:0,interval:null,
    getCfg(){return cfg('hang');},getSets(){return this.getCfg().sets.length;},
    init(){this.reset();const c=this.getCfg();document.getElementById('hi_hang').innerHTML='매달리기 <b>'+c.dur+'초 × '+this.getSets()+'세트</b>';},
    buildGrid(){const g=document.getElementById('sg_hang');g.innerHTML='';const n=this.getSets();for(let i=0;i<n;i++){const d=document.createElement('div');d.className='sc'+(i===0?' cur':'');d.id='sg_hang_'+i;d.innerHTML=(i+1)+'<div class="su">세트</div>';g.appendChild(d);}document.getElementById('sl_hang').textContent='1 / '+n+'세트';document.getElementById('tn_hang').textContent=this.getCfg().dur;document.getElementById('tn_hang').className='tnum';document.getElementById('ts_hang').textContent='준비';document.getElementById('bt_hang').textContent='시작';document.getElementById('bt_hang').className='bm';setArc('af_hang',1,'#d4f03c');},
    act(){if(this.phase==='done')return;if(this.phase==='rest'){this.startPre();return;}if(this.phase==='idle'){this.startPre();return;}if(this.phase==='pre')return;if(this.phase==='hang'){clearInterval(this.interval);this.phase='paused';document.getElementById('bt_hang').textContent='재개';return;}if(this.phase==='paused'){this.phase='hang';document.getElementById('bt_hang').textContent='일시정지';this.interval=setInterval(()=>this.tick(),1000);}},
    startPre(){this.phase='pre';this.preTime=5;document.getElementById('bt_hang').textContent='준비 중...';document.getElementById('bt_hang').className='bm dis';document.getElementById('tn_hang').className='tnum pre';document.getElementById('ts_hang').textContent='곧 시작';setArc('af_hang',0,'#ff3b30');this.preTick();this.interval=setInterval(()=>this.preTick(),1000);},
    preTick(){if(this.preTime<=0){clearInterval(this.interval);this.phase='hang';this.time=this.getCfg().dur;document.getElementById('bt_hang').textContent='일시정지';document.getElementById('bt_hang').className='bm';document.getElementById('tn_hang').className='tnum';bell();this.interval=setInterval(()=>this.tick(),1000);this.tick();return;}document.getElementById('tn_hang').textContent=this.preTime;preBeep();vib(50);setArc('af_hang',1-this.preTime/5,'#ff3b30');this.preTime--;},
    tick(){const dur=this.getCfg().dur;document.getElementById('tn_hang').textContent=this.time;setArc('af_hang',this.time/dur,'#d4f03c');document.getElementById('ts_hang').textContent='매달리기';if(this.time<=0){clearInterval(this.interval);bell();vib([200,100,200]);const el=document.getElementById('sg_hang_'+this.set);if(el){el.classList.remove('cur');el.classList.add('dn');}this.set++;const n=this.getSets();if(this.set>=n){this.phase='done';document.getElementById('tn_hang').textContent='✓';document.getElementById('tn_hang').className='tnum dm';document.getElementById('ts_hang').textContent='완료!';setArc('af_hang',1,'#3cf096');document.getElementById('bt_hang').textContent='완료!';document.getElementById('bt_hang').className='bm dis';document.getElementById('sl_hang').textContent='완료';setTimeout(()=>{doneSnd();vib([100,50,100,50,300]);},400);onExDone('hang');return;}const nxt=document.getElementById('sg_hang_'+this.set);if(nxt)nxt.classList.add('cur');this.phase='rest';document.getElementById('tn_hang').textContent='—';document.getElementById('tn_hang').className='tnum rm';document.getElementById('ts_hang').textContent='준비되면 다음 세트';document.getElementById('sl_hang').textContent=(this.set+1)+' / '+n+'세트';document.getElementById('bt_hang').textContent='다음 세트';document.getElementById('bt_hang').className='bm restm';setArc('af_hang',0,'#3cd4f0');}else this.time--;},
    reset(){clearInterval(this.interval);this.set=0;this.phase='idle';this.time=this.getCfg().dur;this.preTime=5;this.interval=null;this.buildGrid();}
  };EX.hang=ex;
})();

makeRepEx('pull','완료',c=>'풀업 <b>'+c.reps.join(' · ')+'</b> · 휴식 '+c.rest+'초');
makeRepEx('neg','세트 완료',c=>'네거티브 <b>'+c.reps.join(' · ')+'</b> · 휴식 '+c.rest+'초<br>5초 이상 버티며 내려오기');
makeRepEx('push','완료',c=>'기본 푸쉬업 <b>'+c.reps.join('→')+'</b> · 휴식 '+c.rest+'초');

const DAILY_C=716;
function openDailyFs(){document.getElementById('daily-fs').style.display='flex';}

// 스와이프 제스처
(function(){
  const fs=document.getElementById('daily-fs');
  let sy=0,moved=false;
  fs.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;moved=false;},{passive:true});
  fs.addEventListener('touchmove',e=>{
    const dy=e.touches[0].clientY-sy;
    if(Math.abs(dy)>8)moved=true;
  },{passive:true});
  fs.addEventListener('touchend',e=>{
    if(!moved)return;
    const dy=e.changedTouches[0].clientY-sy;
    if(dy<-60){openSet('daily');}      // 위로 스와이프 → 설정
    else if(dy>60){closeDailyFs();}    // 아래로 스와이프 → 닫기
  });
})();
function flashScreen(){
  const f=document.getElementById('flash-overlay');
  f.style.display='block';f.style.opacity='0.9';
  let n=0;const flashes=6;
  const iv=setInterval(()=>{
    f.style.opacity=n%2===0?'0':'0.85';
    n++;if(n>=flashes*2){clearInterval(iv);f.style.display='none';f.style.opacity='0';}
  },120);
}
function updateDailyBtn(done){
  const dur=cfg('daily').dur;
  document.getElementById('daily-btn-sec').textContent=done?'✓':dur+'초';
  document.getElementById('daily-btn').style.borderColor=done?'var(--dn)':'var(--dn)';
  document.getElementById('daily-btn').style.background=done?'rgba(60,240,150,0.15)':'var(--dnd)';
}
(function(){
  const ex={phase:'idle',time:0,preTime:5,interval:null,
    getCfg(){return cfg('daily');},
    init(){
      this.reset();
      const dur=this.getCfg().dur;
      document.getElementById('daily-btn-sec').textContent=this.phase==='done'?'✓':dur+'초';
    },
    buildGrid(){
      const dur=this.getCfg().dur;
      document.getElementById('tn_daily').textContent=dur;
      document.getElementById('tn_daily').className='tnum';
      document.getElementById('ts_daily').textContent='준비';
      document.getElementById('sl_daily').textContent='';
      document.getElementById('bt_daily').textContent='시작';
      document.getElementById('bt_daily').className='bm';
      const el=document.getElementById('af_daily');
      el.style.stroke='#d4f03c';el.style.strokeDashoffset='0';
      updateDailyBtn(false);
    },
    setArcD(ratio,col){
      const el=document.getElementById('af_daily');
      el.style.stroke=col;
      el.style.strokeDashoffset=DAILY_C-Math.max(0,Math.min(1,ratio))*DAILY_C;
    },
    act(){
      if(this.phase==='done')return;
      if(this.phase==='idle'){this.startPre();return;}
      if(this.phase==='pre')return;
      if(this.phase==='hang'){clearInterval(this.interval);this.phase='paused';document.getElementById('bt_daily').textContent='재개';return;}
      if(this.phase==='paused'){this.phase='hang';document.getElementById('bt_daily').textContent='일시정지';this.interval=setInterval(()=>this.tick(),1000);}
    },
    startPre(){
      this.phase='pre';this.preTime=5;
      document.getElementById('bt_daily').textContent='...';
      document.getElementById('bt_daily').className='bm dis';
      document.getElementById('tn_daily').className='tnum pre';
      document.getElementById('ts_daily').textContent='곧 시작';
      this.setArcD(0,'#ff3b30');
      this.preTick();this.interval=setInterval(()=>this.preTick(),1000);
    },
    preTick(){
      if(this.preTime<=0){
        clearInterval(this.interval);
        this.phase='hang';this.time=this.getCfg().dur;
        document.getElementById('bt_daily').textContent='일시정지';
        document.getElementById('bt_daily').className='bm';
        document.getElementById('tn_daily').className='tnum';
        bell();
        this.interval=setInterval(()=>this.tick(),1000);this.tick();return;
      }
      document.getElementById('tn_daily').textContent=this.preTime;
      preBeep();vib(50);
      this.setArcD(1-this.preTime/5,'#ff3b30');
      this.preTime--;
    },
    tick(){
      const dur=this.getCfg().dur;
      document.getElementById('tn_daily').textContent=this.time;
      this.setArcD(this.time/dur,'#d4f03c');
      document.getElementById('ts_daily').textContent='매달리기';
      document.getElementById('sl_daily').textContent=this.time+'초 남음';
      if(this.time<=0){
        clearInterval(this.interval);
        this.phase='done';
        bell();vib([200,100,200]);
        document.getElementById('tn_daily').textContent='✓';
        document.getElementById('tn_daily').className='tnum dm';
        document.getElementById('ts_daily').textContent='완료!';
        document.getElementById('sl_daily').textContent='오늘 데일리 완료';
        document.getElementById('bt_daily').textContent='완료!';
        document.getElementById('bt_daily').className='bm dis';
        this.setArcD(1,'#3cf096');
        updateDailyBtn(true);
        setTimeout(()=>{doneSnd();vib([100,50,100,50,300]);flashScreen();},400);
        recLog('데일리');return;
      }
      this.time--;
    },
    reset(){clearInterval(this.interval);this.phase='idle';this.time=this.getCfg().dur;this.preTime=5;this.interval=null;this.buildGrid();}
  };
  EX.daily=ex;
})();

function renderCal(){const log=getLog();const dm={};log.forEach(e=>{dm[e.d]=e.c;});const ms=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];document.getElementById('cml').textContent=cY+'년 '+ms[cM];const dw=['일','월','화','수','목','금','토'];let h=dw.map(d=>'<div class="cdow">'+d+'</div>').join('');const today=localDate();const fd=new Date(cY,cM,1).getDay();const dim=new Date(cY,cM+1,0).getDate();const dip=new Date(cY,cM,0).getDate();const cc={'턱걸이':'var(--c-pull)','푸쉬업':'var(--c-push)','스쿼트':'var(--c-sqt)'};for(let i=fd-1;i>=0;i--)h+='<div class="cd om">'+(dip-i)+'</div>';for(let d=1;d<=dim;d++){const k=`${cY}-${String(cM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const it=k===today;const cats=dm[k]||[];const future=k>today;const hasDaily=cats.includes('데일리');const wCats=cats.filter(c=>c!=='데일리');let cls='cd clickable';if(it)cls+=' today';if(future)cls='cd om';let dots='';if(wCats.length)dots='<div class="dots">'+wCats.map(c=>'<div class="dot" style="background:'+cc[c]+'"></div>').join('')+'</div>';const bg=cats.length?'background:rgba(255,255,255,.04);':'';const ring=hasDaily?'box-shadow:inset 0 0 0 2px var(--dn);border-radius:50%;':'';h+=future?`<div class="${cls}">${d}</div>`:`<div class="${cls}" onclick="openAdd('${k}')" style="${bg}${ring}">${d}${dots}</div>`;}const tot=fd+dim;const rem=(7-tot%7)%7;for(let d=1;d<=rem;d++)h+='<div class="cd om">'+d+'</div>';document.getElementById('cgrid').innerHTML=h;}

let addKey=null;
function openAdd(dateKey){
  addKey=dateKey;
  const d=new Date(dateKey+'T12:00:00');
  const days=['일','월','화','수','목','금','토'];
  document.getElementById('addDate').textContent=(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+days[d.getDay()]+'요일)';
  const log=getLog();
  const existing=log.find(e=>e.d===dateKey);
  const done=existing?existing.c:[];
  const cats=[{name:'턱걸이',color:'var(--c-pull)'},{name:'푸쉬업',color:'var(--c-push)'},{name:'스쿼트',color:'var(--c-sqt)'},{name:'데일리',color:'var(--dn)'}];
  document.getElementById('addBtns').innerHTML=cats.map(c=>{
    const has=done.includes(c.name);
    return`<button class="add-btn${has?' added':''}" onclick="addWorkout('${dateKey}','${c.name}')"><div class="ab-dot" style="background:${c.color}"></div>${c.name}${has?' ✓ 추가됨':''}</button>`;
  }).join('');

}
function closeAdd(){document.getElementById('addlg').classList.remove('show');addKey=null;}

function addWorkout(dateKey,cat){
  const log=getLog();
  const ex=log.find(e=>e.d===dateKey);
  if(ex){if(ex.c.includes(cat))return;ex.c.push(cat);}
  else{log.push({d:dateKey,c:[cat]});log.sort((a,b)=>b.d.localeCompare(a.d));}
  if(log.length>365)log.splice(365);
  savLog(log);updLogBtn();renderStats();renderRecent();renderCal();
  openAdd(dateKey);
}
function renderStats(){const log=getLog();const today=localDate();let streak=0;const chk=new Date();for(let i=0;i<365;i++){const k=localDate(chk);if(log.find(e=>e.d===k)){streak++;chk.setDate(chk.getDate()-1);}else if(k===today){chk.setDate(chk.getDate()-1);}else break;}const ym=today.slice(0,7);const monthly=log.filter(e=>e.d.startsWith(ym)).length;document.getElementById('stats').innerHTML=`<div class="stc"><div class="stn">${streak}일</div><div class="stl">연속</div></div><div class="stc"><div class="stn">${monthly}회</div><div class="stl">이번 달</div></div><div class="stc"><div class="stn">${log.length}회</div><div class="stl">전체</div></div>`;}
function renderRecent(){const log=getLog();const days=['일','월','화','수','목','금','토'];const cc={'턱걸이':'var(--c-pull)','푸쉬업':'var(--c-push)','스쿼트':'var(--c-sqt)','데일리':'var(--dn)'};if(!log.length){document.getElementById('rlog').innerHTML='<div style="text-align:center;padding:40px 0;color:var(--mu);font-size:13px">아직 기록 없음</div>';return;}document.getElementById('rlog').innerHTML=log.slice(0,30).map((e,idx)=>{const d=new Date(e.d+'T12:00:00');const tags=e.c.map((c,ci)=>'<span class="rctag" style="background:'+cc[c]+'22;color:'+cc[c]+'" onclick="rmTag('+idx+','+ci+')">'+c+' ✕</span>').join('');return`<div class="rci"><div><div class="rcd">${d.getMonth()+1}월 ${d.getDate()}일</div><div class="rcs">${days[d.getDay()]}요일</div></div><div class="rctags">${tags}<button class="rdel" onclick="rmEntry(${idx})">✕</button></div></div>`;}).join('');}

function backupLog(){
  const log=getLog();const cfg=localStorage.getItem('ht_cfg')||'{}';
  const data=JSON.stringify({log,cfg:JSON.parse(cfg),exported:new Date().toISOString()},null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const d=new Date();const fn='홈트_백업_'+d.getFullYear()+('0'+(d.getMonth()+1)).slice(-2)+('0'+d.getDate()).slice(-2)+'.json';
  a.href=url;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  try{localStorage.setItem('ht_lastbk',new Date().toISOString());}catch(e){}
  const ok=document.getElementById('bkupOk');ok.textContent='✓ 백업 완료 ('+log.length+'일 기록)';ok.style.display='block';
  setTimeout(()=>{ok.style.display='none';},3000);

}

function checkBackupRemind(){
  const log=getLog();if(!log.length)return;
  const last=localStorage.getItem('ht_lastbk');

  const days=Math.floor((Date.now()-new Date(last).getTime())/(1000*60*60*24));

}

function restoreLog(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.log||!Array.isArray(data.log)){
        const ok=document.getElementById('bkupOk');ok.textContent='⚠ 올바른 백업 파일이 아닙니다';ok.style.display='block';ok.style.color='#ff5050';
        setTimeout(()=>{ok.style.display='none';ok.style.color='';},3000);return;
      }
      const cur=getLog();
      const merged={};
      cur.forEach(e=>{merged[e.d]={d:e.d,c:[...e.c]};});
      data.log.forEach(e=>{
        if(merged[e.d]){e.c.forEach(c=>{if(!merged[e.d].c.includes(c))merged[e.d].c.push(c);});}
        else{merged[e.d]={d:e.d,c:[...e.c]};}
      });
      const result=Object.values(merged).sort((a,b)=>b.d.localeCompare(a.d));
      savLog(result);
      if(data.cfg){saveS(data.cfg);initAll();}
      updLogBtn();renderStats();renderRecent();renderCal();
      const ok=document.getElementById('bkupOk');ok.textContent='✓ 복원 완료 ('+result.length+'일 기록)';ok.style.display='block';ok.style.color='';
      setTimeout(()=>{ok.style.display='none';},3000);
    }catch(err){
      const ok=document.getElementById('bkupOk');ok.textContent='⚠ 파일 읽기 실패';ok.style.display='block';ok.style.color='#ff5050';
      setTimeout(()=>{ok.style.display='none';ok.style.color='';},3000);
    }
  };
  reader.readAsText(file);
  input.value='';
}

    (async()=>{try{if('wakeLock' in navigator)await navigator.wakeLock.request('screen');}catch(e){}})();
  },10000);
}
document.addEventListener('touchstart',function ns(){noSleep();document.removeEventListener('touchstart',ns);},{passive:true});
document.addEventListener('click',function ns2(){noSleep();document.removeEventListener('click',ns2);});
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')noSleep();});
</script>
